# 로컬 개발용 PostgreSQL (Vercel/프로덕션과 동일한 Prisma provider)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: card_compliance
    ports:
      - "5432:5432"
    volumes:
      - card_pg_data:/var/lib/postgresql/data

volumes:
  card_pg_data:
