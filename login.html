<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    http-equiv="Cache-Control"
    content="no-store, max-age=0, must-revalidate"
  />
  <title>로그인 — 법인카드 모니터링</title>
  <style>
    :root {
      --sbs-navy: #005596;
      --sbs-blue: #0085ca;
      --border: #e2e8f0;
      --surface-muted: #f8fafc;
      --foreground: #0f1e2e;
      --foreground-muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--surface-muted);
      color: var(--foreground);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06);
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 8px;
      color: var(--sbs-navy);
    }
    p.sub { margin: 0 0 24px; font-size: 13px; color: var(--foreground-muted); }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--foreground-muted);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input:focus {
      outline: none;
      border-color: var(--sbs-blue);
      box-shadow: 0 0 0 3px rgba(0, 133, 202, 0.15);
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--sbs-navy);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg-error {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .msg-error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>법인카드 모니터링</h1>
    <p class="sub">로그인 후 대시보드를 이용할 수 있습니다.</p>
    <form id="loginForm" autocomplete="on">
      <label for="username">아이디</label>
      <input id="username" name="username" type="text" required autocomplete="username" />
      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
      <button type="submit" id="btnSubmit">로그인</button>
    </form>
    <p class="msg-error" id="loginError"></p>
  </div>
  <script>
(function () {
  var STATIC_AUTH_KEY = 'cardMonitorStaticAuth';
  var isFile = window.location.protocol === 'file:';
  var isHttp = window.location.protocol.indexOf('http') === 0;
  var API_ORIGIN = isFile ? 'http://localhost:3001' : window.location.origin.replace(/\/$/, '');
  var useServerAuth = isFile || isHttp;
  var AUTH_BASE =
    isFile || (API_ORIGIN && /:3001\b/.test(API_ORIGIN))
      ? API_ORIGIN + '/api/auth'
      : API_ORIGIN + '/api/cm/auth';
  var params = new URLSearchParams(window.location.search || '');
  var returnPath = params.get('return') || '/design-preview.html';
  function safeReturn(url) {
    if (!url || url.indexOf('/') !== 0 || url.indexOf('//') === 0) return '/design-preview.html';
    return url;
  }
  returnPath = safeReturn(returnPath);
  var afterLoginHref = useServerAuth && isFile ? API_ORIGIN + returnPath : returnPath;

  function setStaticAuthed() {
    try {
      localStorage.setItem(STATIC_AUTH_KEY, '1');
    } catch (e) {}
  }
  function isStaticAuthed() {
    try {
      return localStorage.getItem(STATIC_AUTH_KEY) === '1';
    } catch (e) {
      return false;
    }
  }

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var err = document.getElementById('loginError');
    err.classList.remove('show');
    var btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    if (!useServerAuth) {
      if (username === 'admin' && password === 'admin') {
        setStaticAuthed();
        window.location.href = afterLoginHref;
        return;
      }
      err.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      err.classList.add('show');
      btn.disabled = false;
      return;
    }
    fetch(AUTH_BASE + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username: username, password: password }),
    })
      .then(function (res) {
        return res.json().then(function (data) {
          if (!res.ok) throw new Error(data.error || '로그인 실패');
          return data;
        });
      })
      .then(function () {
        window.location.href = afterLoginHref;
      })
      .catch(function (ex) {
        err.textContent = ex.message || String(ex);
        err.classList.add('show');
      })
      .finally(function () {
        btn.disabled = false;
      });
  });

  if (!useServerAuth) {
    if (isStaticAuthed()) window.location.replace(afterLoginHref);
    return;
  }
  fetch(AUTH_BASE + '/me', { credentials: 'include' }).then(function (res) {
    if (res.ok) window.location.replace(afterLoginHref);
  });
})();
  </script>
</body>
</html>
